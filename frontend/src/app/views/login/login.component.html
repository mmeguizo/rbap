<div class="login-shell min-vh-100 d-flex align-items-center py-4 py-lg-5">
  <c-container>
    <c-row class="justify-content-center">
      <c-col [xs]="12" [md]="10" [lg]="7" [xl]="5">
        <c-card class="login-card border-0 overflow-hidden">
          <c-card-body class="p-4 p-md-5">
            <div class="login-card-glow"></div>

            <div class="login-header mb-4 text-center">
              <div class="login-brand mb-3">
                <img alt="CHMSU Logo" class="login-logo" [src]="logoUrl" />
                <span class="login-badge d-inline-flex">RBAP</span>
              </div>
              <h1 class="h2 mb-2">Login to RBAP</h1>
              <p class="login-copy mb-0">
                Access the monitoring portal with a clean frontend shell. Authentication and data
                flow stay on the backend.
              </p>
            </div>

            <form>
              <div class="mb-3">
                <label class="form-label" for="email">Email address</label>
                <input
                  id="email"
                  class="form-control form-control-lg login-input"
                  type="email"
                  placeholder="name@chmsu.edu.ph"
                  autocomplete="email"
                />
              </div>

              <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <input
                  id="password"
                  class="form-control form-control-lg login-input"
                  type="password"
                  placeholder="Enter your password"
                  autocomplete="current-password"
                />
              </div>

              <div class="d-grid gap-3">
                <button class="btn btn-primary btn-lg login-button" type="button">Sign in</button>

                <button
                  class="btn btn-lg google-login-button"
                  type="button"
                  (click)="loginWithGoogle()"
                >
                  <span class="google-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                      <path
                        fill="#EA4335"
                        d="M12 10.2v3.9h5.4c-.2 1.2-.9 2.3-1.9 3l3.1 2.4c1.8-1.7 2.8-4.1 2.8-6.9 0-.7-.1-1.4-.2-2H12Z"
                      />
                      <path
                        fill="#34A853"
                        d="M12 21c2.5 0 4.7-.8 6.2-2.2l-3.1-2.4c-.9.6-1.9 1-3.1 1-2.4 0-4.4-1.6-5.1-3.7l-3.2 2.5C5.1 18.9 8.3 21 12 21Z"
                      />
                      <path
                        fill="#FBBC05"
                        d="M6.9 13.7c-.2-.6-.3-1.1-.3-1.7s.1-1.2.3-1.7l-3.2-2.5C3 9.1 2.6 10.5 2.6 12s.4 2.9 1.1 4.2l3.2-2.5Z"
                      />
                      <path
                        fill="#4285F4"
                        d="M12 6.6c1.3 0 2.5.5 3.4 1.3l2.6-2.6C16.6 3.8 14.5 3 12 3 8.3 3 5.1 5.1 3.7 7.8l3.2 2.5c.7-2.1 2.7-3.7 5.1-3.7Z"
                      />
                    </svg>
                  </span>
                  <span>Login with Google</span>
                </button>

                <a class="dashboard-preview" routerLink="/dashboard">Open dashboard shell</a>
              </div>
            </form>
          </c-card-body>
        </c-card>
      </c-col>
    </c-row>
  </c-container>
</div>
